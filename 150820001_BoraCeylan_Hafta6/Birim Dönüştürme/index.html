<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birim Dönüştürücü</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <h2>Birim Dönüştürücü</h2>
        
        <label>Değer Giriniz:</label>
        <input type="number" id="degerInput" placeholder="Örn: 50">
        
        <label>Dönüşüm Tipi:</label>
        <select id="donusumSelect">
            <option value="c2f">Celsius -> Fahrenheit</option>
            <option value="m2km">Metre -> Kilometre</option>
            <option value="kg2g">Kilogram -> Gram</option>
        </select>
        
        <button class="btn-blue" onclick="birimDonustur()">Hesapla</button>

        <div class="result-box success-box">
            <h3 id="donusumSonucText">Sonuç: -</h3>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
